{% extends 'base.html' %}
{% block title %}Password Changed — TrailShare{% endblock %}
{% block content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center py-5">
  <div class="w-100 text-center" style="max-width:440px">
    <div style="font-size:3rem" class="mb-3">✅</div>
    <h2>Password updated!</h2>
    <p class="text-secondary mb-4">Your password has been changed successfully. You can now sign in with your new password.</p>
    <a href="{% url 'login' %}" class="btn btn-ts px-5">Sign In <i class="bi bi-arrow-right ms-1"></i></a>
  </div>
</div>
{% endblock %}
