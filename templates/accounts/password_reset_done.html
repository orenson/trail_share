{% extends 'base.html' %}
{% block title %}Check Your Email — TrailShare{% endblock %}
{% block content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center py-5">
  <div class="w-100 text-center" style="max-width:460px">
    <div style="font-size:3rem" class="mb-3">📬</div>
    <h2>Check your inbox</h2>
    <p class="text-secondary mb-4">
      If an account exists for that email address, we've sent a password reset link.
      It will expire in <strong class="text-light">1 hour</strong>.
    </p>
    <a href="{% url 'login' %}" class="btn btn-outline-secondary mt-3">Back to Sign In</a>
  </div>
</div>
{% endblock %}
