<!DOCTYPE html>
<html>
<body style="font-family:sans-serif;background:#0f1a14;color:#d8eee0;padding:2rem;max-width:520px;margin:0 auto">
  <h2 style="color:#52B788;margin-bottom:.5rem">⛰️ TrailShare</h2>
  <h3>Password Reset</h3>
  <p>Hi <strong>{{ user.username }}</strong>,</p>
  <p>You requested a password reset. Click the button below to set a new password:</p>
  <p style="margin:2rem 0">
    <a href="{{ protocol }}://{{ domain }}{% url 'password_reset_confirm' uidb64=uid token=token %}"
       style="background:#52B788;color:#0f1a14;padding:.75rem 1.5rem;border-radius:6px;text-decoration:none;font-weight:bold">
      Reset My Password
    </a>
  </p>
  <p style="color:#7a9e84;font-size:.85rem">This link expires in <strong style="color:#d8eee0">1 hour</strong>.<br>
  If you didn't request this, you can safely ignore this email.</p>
  <hr style="border-color:#2a3f2f;margin:2rem 0">
  <p style="color:#4a6b52;font-size:.78rem">— The TrailShare Team</p>
</body>
</html>
