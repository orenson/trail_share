{% extends 'base.html' %}
{% block title %}Reset Password — TrailShare{% endblock %}
{% block content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center py-5">
  <div class="w-100" style="max-width:420px">
    <div class="text-center mb-4">
      <span style="font-size:2.5rem">🔑</span>
      <h2 class="mt-2">Reset your password</h2>
      <p class="text-secondary">Enter the email address linked to your account and we'll send you a reset link.</p>
    </div>
    <div class="card">
      <div class="card-body p-4">
        <form method="post">
          {% csrf_token %}
          <div class="mb-4">
            <label class="form-label small">Email address</label>
            <input type="email" name="email" class="form-control"
                   placeholder="you@example.com" required autofocus>
          </div>
          <button type="submit" class="btn btn-ts w-100">
            Send Reset Link <i class="bi bi-envelope ms-1"></i>
          </button>
        </form>
      </div>
    </div>
    <p class="text-center text-secondary small mt-3">
      Remembered it? <a href="{% url 'login' %}" class="text-decoration-none" style="color:var(--ts-green)">Back to sign in</a>
    </p>
  </div>
</div>
{% endblock %}
